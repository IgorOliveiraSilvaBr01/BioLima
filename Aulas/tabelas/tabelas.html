<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas em HTML</title>
  </head>
  <body>

    <table border=""> <!-- estrutura base -->
        <thead> <!-- cabeçalho da tabela-->
            <tr> <!-- linha-->
                <th>Nome</th> <!-- define o valor do cabeçalho -->
                <th>Idade</th> 
                <th>Cidade</th>
            </tr> 
        </thead> 

        <tbody> <!-- corpo da tabela-->
            <tr> <!-- linha-->
                <td>Igor</td> <!-- defini um dado ao corpo-->
                <td>17</td>
                <td>Carapicuíba</td>
            </tr>
            <tr>
                <td>Medina</td>
                <td>19</td>
                <td>Raposo Tavares</td>
            </tr>
            <tr>
                <td>Marcos</td>
                <td>17</td>
                <td>Osasco</td>
            </tr>
        </tbody> 
    </table>

  </body>
</html>
