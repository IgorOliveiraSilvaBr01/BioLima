<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag video em HTML</title>
</head>
<body>
    <!-- A tag <video> é usada para anexar vídeos em uma página web
        
    Atributos comuns:
    
    - controls:
        mostra controles padrão (play, pause, volume).

    - width e height:
        ajustam o tamanho do vídeo.
    
    - autoplay:
        da o play no vídeo automaticamente.

    Os principais formatos suportados são: MP4, WebM e ogg

    a tag <source> é utilizada dentro de <video> para anexar os arquivos de video
    -->

    <h2>Exemplo de vídeo em HTML</h2>
    <video controls>
        <source src="mov_bbb.mp4">
    </video>
</body>
</html>
