<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag audio em HTML</title>
</head>
<body>
    <!-- Tag <audio> em HTML
    A tag <audio> consiste em anexar arquivos de áudio em uma página web sem a necessidade de plugins externos.
        
    Atributos comuns:
    
    - controls:
        mostra os controles padrão do player (pause, play, ...).

    - autoplay:
        inicia o som automaticamente ao abrir a página web.

    - muted:
        inicia o áudio sem o som (útil para permitir autoplay).

    Os formatos de áudio mais suportados são: MP3, WAV e Ogg.
    -->

    <h2>Exemplo de Áudio em HTML</h2>
    <audio controls>
        <source src="Record (online-voice-recorder.com).mp3">
    </audio>
</body>
</html>
